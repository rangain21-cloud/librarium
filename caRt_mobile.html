    <style>
        :root {
            --bg-dark: #1a2332;
            --bg-panel: #243447;
            --bg-card: #2d4060;
            --accent: #4a9eff;
            --accent2: #27ae60;
            --accent3: #f39c12;
            --accent4: #9b59b6;
            --danger: #e74c3c;
            --text: #e8f0fe;
            --text-muted: #8fa8c8;
            --border: #3a5068;
            --header-h: 56px;
            --menu-w: 300px;
            --menu-collapsed-w: 48px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            /* touch-action libre sur body → zoom natif autorisé sur la sidebar */
        }

        /* ─── HEADER ──────────────────────────────── */
        #header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 300;
            height: var(--header-h);
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
            padding: 0 16px;
        }

        #burgerBtn {
            width: 44px; height: 44px;
            background: none; border: none; cursor: pointer;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 5px;
            border-radius: 8px; transition: background 0.2s;
        }
        #burgerBtn:active { background: var(--bg-card); }
        #burgerBtn span {
            display: block; width: 22px; height: 2px;
            background: var(--text); border-radius: 2px;
            transition: all 0.3s;
        }
        #burgerBtn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        #burgerBtn.open span:nth-child(2) { opacity: 0; }
        #burgerBtn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        #appTitle {
            font-size: 1.1rem; font-weight: 700;
            color: var(--accent); letter-spacing: 0.04em; flex: 1;
        }
        #lotBadge {
            background: var(--accent3); color: #000;
            font-size: 0.75rem; font-weight: 700;
            padding: 3px 8px; border-radius: 12px;
            display: none;
        }

        /* ─── MAP ─────────────────────────────────── */
        /* ─── SPLIT LAYOUT ───────────────────────── */
        #appBody {
            position: fixed;
            top: var(--header-h); left: 0; right: 0; bottom: 0;
            display: flex;
        }

        /* ─── SIDEBAR (always visible) ──────────── */
        #sidebar {
            width: var(--menu-w);
            min-width: var(--menu-w);
            flex-shrink: 0;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow-x: hidden;
            overflow-y: visible;
            transition: width 0.25s cubic-bezier(0.4,0,0.2,1),
                        min-width 0.25s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            touch-action: auto; /* zoom pinch + scroll natifs libres sur la sidebar */
        }
        #sidebar.collapsed {
            width: var(--menu-collapsed-w) !important;
            min-width: var(--menu-collapsed-w) !important;
        }
        #sidebar.collapsed #sidebarScroll { opacity: 0; pointer-events: none; }
        #sidebar.collapsed #sidebarHead .logo,
        #sidebar.collapsed #sidebarHead .sub { display: none; }
        #sidebar.collapsed #collapsedIcons { display: flex; }
        #collapsedIcons {
            display: none;
            flex-direction: column; align-items: center;
            gap: 6px; padding: 8px 0;
        }
        .ci-btn {
            width: 36px; height: 36px; border: none; background: none;
            color: var(--text-muted); font-size: 1.1rem; cursor: pointer;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }
        .ci-btn:active { background: var(--bg-card); }
        .ci-btn.highlight { color: var(--accent); }

        /* ── RESIZE HANDLE ────────────────────────── */
        #sidebarResizeHandle {
            position: absolute; top: 0; right: -1px; bottom: 0;
            width: 18px; cursor: ew-resize; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }
        #sidebarResizeHandle::after {
            content: '';
            display: block; width: 4px; height: 48px;
            background: var(--accent); border-radius: 4px;
            opacity: 0.25; transition: opacity 0.2s, height 0.2s;
        }
        #sidebarResizeHandle:active::after,
        #sidebarResizeHandle:hover::after { opacity: 0.8; height: 80px; }

        #sidebarHead {
            background: var(--bg-dark);
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px;
            flex-shrink: 0;
        }
        #sidebarHead .logo { font-size: 1.1rem; font-weight: 800; color: var(--accent); flex: 1; white-space: nowrap; overflow: hidden; }
        #sidebarHead .sub { font-size: 0.7rem; color: var(--text-muted); display: block; }

        #sidebarScroll {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            min-height: 0;
            padding: 10px;
            display: flex; flex-direction: column; gap: 8px;
            -webkit-overflow-scrolling: touch;
            transition: opacity 0.15s;
            touch-action: auto; /* pinch-zoom + scroll libres */
        }
        #sidebarScroll::-webkit-scrollbar { width: 3px; }
        #sidebarScroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ─── MAP AREA ────────────────────────────── */
        #mapArea {
            flex: 1; min-width: 0;
            position: relative;
            overflow: hidden; background: #ecf0f1;
            touch-action: none; /* JS gère zoom+pan ici, pas le navigateur */
        }
        #svgWrapper {
            width: 100%; height: 100%;
            transform-origin: 0 0;
            will-change: transform;
        }
        #svgWrapper svg { width: 100%; height: 100%; display: block; }

        #emptyHint {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px; color: var(--bg-panel); pointer-events: none;
        }
        #emptyHint svg { width: 64px; height: 64px; opacity: .3; }
        #emptyHint p { font-size: 1rem; opacity: .5; }

        /* ─── SVG WRAPPER ─────────────────────────── */

        /* ─── SECTION CARD ────────────────────────── */
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: visible; /* ne jamais couper les boutons */
        }
        .section-header {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 14px;
            cursor: pointer;
            user-select: none;
        }
        .section-header:active { background: rgba(255,255,255,.05); }
        .section-icon { font-size: 1.1rem; }
        .section-title { font-size: 0.9rem; font-weight: 600; flex: 1; }
        .section-arrow {
            font-size: 0.7rem; color: var(--text-muted);
            transition: transform 0.25s;
        }
        .section-body {
            padding: 0 14px 18px;
            display: none;
        }
        .section-card.expanded .section-arrow { transform: rotate(90deg); }
        .section-card.expanded .section-body { display: block; }

        /* ─── DRIVE SECTION ───────────────────────── */
        #driveStatus {
            font-size: 0.8rem; padding: 8px 10px;
            border-radius: 8px; margin-bottom: 10px;
            background: var(--bg-panel); border: 1px solid var(--border);
        }
        #driveStatus.connected { border-color: var(--accent2); color: var(--accent2); }
        #driveStatus.error { border-color: var(--danger); color: var(--danger); }

        .drive-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        /* ─── FILTER SECTION ──────────────────────── */
        .sort-row {
            display: flex; gap: 8px; margin-bottom: 10px;
        }
        .sort-opt {
            flex: 1; padding: 8px 6px;
            background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 8px; cursor: pointer;
            font-size: 0.78rem; color: var(--text-muted);
            text-align: center; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .sort-opt.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .styled-select {
            width: 100%; padding: 10px 12px;
            background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text);
            font-size: 0.85rem; margin-bottom: 6px;
            appearance: none;
        }

        /* ── LISTE LOTS DU PROPRIÉTAIRE ────────── */
        #proprioLots {
            display: none;
            flex-direction: column; gap: 3px;
            margin-bottom: 8px;
            max-height: 260px; overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #proprioLots::-webkit-scrollbar { width: 3px; }
        #proprioLots::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        #proprioLots.visible { display: flex; }
        .pl-item {
            padding: 7px 10px; border-radius: 7px; cursor: pointer;
            background: var(--bg-dark); border: 1px solid var(--border);
            transition: background 0.15s, opacity 0.2s, transform 0.2s, padding 0.2s;
        }
        .pl-item:active, .pl-item.selected {
            background: var(--accent); border-color: var(--accent);
        }
        /* Quand un lot est sélectionné, les autres sont atténués et compressés */
        .pl-item.dimmed {
            opacity: 0.28;
            padding-top: 4px;
            padding-bottom: 4px;
            transform: scaleY(0.88);
            transform-origin: top;
        }
        .pl-item.dimmed:active { opacity: 0.7; }
        .pl-item-top { display: flex; align-items: center; gap: 6px; }
        .pl-id { font-size: 0.82rem; font-weight: 700; color: var(--accent3); }
        .pl-item.selected .pl-id { color: #fff; }
        .pl-badge { font-size: 0.65rem; }
        .pl-sub { font-size: 0.74rem; color: var(--text-muted); margin-top: 2px; line-height: 1.3; }
        .pl-item.selected .pl-sub { color: rgba(255,255,255,0.75); }
        .pl-text { font-size: 0.72rem; color: var(--text-muted); font-style: italic; margin-top: 2px; line-height: 1.3; }
        .pl-item.selected .pl-text { color: rgba(255,255,255,0.65); }

        .search-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .search-input {
            flex: 1; padding: 10px 12px;
            background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text);
            font-size: 0.9rem;
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { outline: none; border-color: var(--accent); }

        /* ─── LOT INFO SECTION ────────────────────── */
        #lotInfoBody { font-size: 0.85rem; }
        #lotInfoBody .lot-num {
            font-size: 1.6rem; font-weight: 800;
            color: var(--accent3); text-align: center;
            padding: 6px 0 12px;
        }
        .info-row {
            display: flex; align-items: flex-start; gap: 6px;
            padding: 6px 0; border-bottom: 1px solid var(--border);
            line-height: 1.35;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-muted); min-width: 80px; font-size: 0.78rem; padding-top: 1px; }
        .info-value { color: var(--text); flex: 1; }
        .lot-comment {
            margin-top: 10px; padding: 8px 10px;
            background: var(--bg-panel); border-radius: 8px;
            border-left: 3px solid var(--accent4);
            font-size: 0.82rem; line-height: 1.4;
            color: var(--text);
            white-space: pre-wrap;
        }
        #commentImg {
            width: 100%; border-radius: 8px; margin-top: 8px;
            display: none; cursor: pointer;
        }

        /* ─── COMMENT FORM ────────────────────────── */
        .comment-form { margin-top: 10px; display: none; }
        .comment-form textarea {
            width: 100%; min-height: 80px;
            padding: 8px; background: var(--bg-panel);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 0.85rem;
            resize: vertical; margin-bottom: 6px;
            font-family: inherit;
        }
        .comment-form textarea:focus { outline: none; border-color: var(--accent); }

        /* ─── BUTTONS ─────────────────────────────── */
        .btn {
            padding: 10px 14px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 0.82rem; font-weight: 600;
            transition: all 0.2s; display: inline-flex;
            align-items: center; gap: 5px; white-space: nowrap;
            min-height: 44px; /* cible tactile Android minimale */
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #3a8ef0; }
        .btn-success { background: var(--accent2); color: #fff; }
        .btn-warning { background: var(--accent3); color: #000; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-muted { background: var(--bg-panel); color: var(--text-muted); border: 1px solid var(--border); }
        .btn-purple { background: var(--accent4); color: #fff; }
        .btn-sm { padding: 7px 10px; font-size: 0.78rem; }
        .btn-full { width: 100%; justify-content: center; }
        .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

        .btn-row { display: flex; gap: 7px; flex-wrap: wrap; }

        /* ─── STATUS MSG ──────────────────────────── */
        .status-msg {
            font-size: 0.78rem; padding: 4px 0;
            color: var(--text-muted);
        }
        .status-msg.ok { color: var(--accent2); }
        .status-msg.err { color: var(--danger); }

        /* ─── TOAST ───────────────────────────────── */
        #toast {
            position: fixed; bottom: 24px; left: 50%; z-index: 900;
            transform: translateX(-50%) translateY(80px);
            background: #222e3c; color: var(--text);
            padding: 10px 20px; border-radius: 24px;
            font-size: 0.85rem; border: 1px solid var(--border);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            pointer-events: none; white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,.5);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ─── MODALS ──────────────────────────────── */
        .modal {
            position: fixed; inset: 0; z-index: 600;
            background: rgba(0,0,0,.7);
            display: none; align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal.open { display: flex; }
        .modal-box {
            background: var(--bg-panel); border-radius: 16px;
            padding: 20px; max-width: 380px; width: 100%;
            border: 1px solid var(--border);
        }
        .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
        .modal-body { font-size: 0.85rem; line-height: 1.5; margin-bottom: 16px; color: var(--text-muted); }
        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

        /* ─── IMAGE MODAL ─────────────────────────── */
        #imgModal {
            position: fixed; inset: 0; z-index: 700;
            background: rgba(0,0,0,.92);
            display: none; align-items: center; justify-content: center;
        }
        #imgModal.open { display: flex; }
        #imgModalClose {
            position: absolute; top: 16px; right: 16px;
            background: rgba(255,255,255,.15); border: none;
            color: #fff; font-size: 1.4rem; cursor: pointer;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        #imgModalImg {
            max-width: 92vw; max-height: 88vh;
            border-radius: 8px; object-fit: contain;
        }

        /* ─── SVG HIGHLIGHTS ──────────────────────── */
        .hl-selected { fill: #40E0D0 !important; stroke: #0000FF !important; stroke-width: 2px !important; cursor: pointer; }
        .hl-same    { fill: #2ecc71 !important; stroke: #27ae60 !important; stroke-width: 2px !important; cursor: pointer; }
        .hl-filter  { fill: #9b59b6 !important; stroke: #8e44ad !important; stroke-width: 2px !important; cursor: pointer; }
        .hl-search  { fill: #40E0D0 !important; stroke: #2980b9 !important; stroke-width: 2px !important; cursor: pointer; }

        /* ─── TOUCH FEEDBACK ──────────────────────── */
        @media (hover: none) {
            .btn:hover { opacity: 1; }
        }

        /* ─── DIVIDER ─────────────────────────────── */
        .divider { height: 1px; background: var(--border); margin: 8px 0; }

        /* File input hidden */
        input[type="file"] { display: none; }

        /* Lot badge in header */
        #selectedLotInfo {
            font-size: 0.75rem; color: var(--text-muted);
            padding: 0 8px;
        }
    </style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════ -->
<div id="header">
    <button id="burgerBtn" onclick="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
    <span id="appTitle">Cartum</span>
    <span id="selectedLotInfo"></span>
    <span id="lotBadge"></span>
</div>

<!-- ══ APP BODY (split) ════════════════════════════ -->
<div id="appBody">

  <!-- ── SIDEBAR ─────────────────────────────────── -->
  <div id="sidebar">
    <div id="sidebarResizeHandle"></div>

    <div id="sidebarHead">
        <div style="flex:1;overflow:hidden">
            <div class="logo">Cartum</div>
            <span class="sub">Carte interactive</span>
        </div>
    </div>

    <!-- Icônes visibles quand sidebar réduite -->
    <div id="collapsedIcons">
        <button class="ci-btn" title="Google Drive" onclick="toggleSidebar();expandSec('sec-drive')">☁️</button>
        <button class="ci-btn" title="Filtrer" onclick="toggleSidebar();expandSec('sec-filter')">🔍</button>
        <button class="ci-btn" title="Infos lot" onclick="toggleSidebar();expandSec('sec-info')">📌</button>
    </div>

    <div id="sidebarScroll">

        <!-- ── A) GOOGLE DRIVE ─────────────────── -->
        <div class="section-card expanded" id="sec-drive">
            <div class="section-header" onclick="toggleSection('sec-drive')">
                <span class="section-icon">☁️</span>
                <span class="section-title">Google Drive</span>
                <span class="section-arrow">▶</span>
            </div>
            <div class="section-body">
                <div id="driveStatus">Non connecté</div>
                <div class="drive-btns">
                    <button class="btn btn-primary" onclick="driveConnect()">🔗 Connecter</button>
                    <button class="btn btn-muted" id="btnDriveLoad" onclick="driveLoad()" disabled>⬇ Charger depuis Drive</button>
                    <button class="btn btn-success" id="btnDriveSave" onclick="driveSave()" disabled>⬆ Sauvegarder sur Drive</button>
                    <button class="btn btn-warning btn-sm" onclick="driveTest()">🧪 TEST DRIVE</button>
                </div>
                <div class="divider"></div>
                <p style="font-size:0.78rem;color:var(--text-muted);line-height:1.4">
                    Ou charger localement depuis l'appareil :
                </p>
                <div style="margin-top:8px;display:flex;gap:8px">
                    <button class="btn btn-muted btn-sm btn-full" onclick="document.getElementById('localSvgInput').click()">🗺 Carte SVG</button>
                    <button class="btn btn-muted btn-sm btn-full" onclick="document.getElementById('localCsvInput').click()">📋 Légende CSV</button>
                </div>
                <input type="file" id="localSvgInput" accept=".svg" onchange="loadLocalSvg(this)">
                <input type="file" id="localCsvInput" accept=".csv" onchange="loadLocalCsv(this)">
                <div id="localStatus" class="status-msg" style="margin-top:6px"></div>
            </div>
        </div>

        <!-- ── B) FILTRER PAR PROPRIÉTAIRE ────── -->
        <div class="section-card" id="sec-filter">
            <div class="section-header" onclick="toggleSection('sec-filter')">
                <span class="section-icon">🔍</span>
                <span class="section-title">Filtrer par propriétaire</span>
                <span class="section-arrow">▶</span>
            </div>
            <div class="section-body">
                <div class="sort-row">
                    <div class="sort-opt active" id="sortById" onclick="setSortMode('id')"># Id</div>
                    <div class="sort-opt" id="sortByCount" onclick="setSortMode('count')">📦 Nb lots</div>
                </div>
                <select id="idProprioFilter" class="styled-select" onchange="applyProprioFilter()">
                    <option value="">— Tous les propriétaires —</option>
                </select>

                <!-- Liste des lots du proprio sélectionné -->
                <div id="proprioLots"></div>

                <div class="search-row">
                    <input type="text" id="lotSearch" class="search-input" placeholder="Rechercher un lot…"
                           onkeydown="if(event.key==='Enter') searchLot()">
                    <button class="btn btn-primary btn-sm" onclick="searchLot()">🔎</button>
                    <button class="btn btn-muted btn-sm" onclick="clearSearch()">✕</button>
                </div>
                <div id="searchStatus" class="status-msg"></div>
                <div class="btn-row" style="margin-top:8px">
                    <button class="btn btn-danger btn-sm" onclick="resetFilter()">↺ Réinitialiser</button>
                </div>
            </div>
        </div>

        <!-- ── C) INFORMATIONS DU LOT ─────────── -->
        <div class="section-card" id="sec-info">
            <div class="section-header" onclick="toggleSection('sec-info')">
                <span class="section-icon">📌</span>
                <span class="section-title">Informations du lot</span>
                <span class="section-arrow">▶</span>
            </div>
            <div class="section-body">
                <div id="lotInfoBody">
                    <p style="color:var(--text-muted);font-size:0.85rem">Appuyez sur un lot pour voir ses détails.</p>
                </div>

                <!-- Comment display -->
                <div id="commentDisplay" style="display:none">
                    <div id="commentText" class="lot-comment"></div>
                    <img id="commentImg" onclick="openImgModal(this.src)" alt="Photo du lot">
                    <div class="btn-row" style="margin-top:8px">
                        <button class="btn btn-purple btn-sm" onclick="editComment()">✏️ Modifier</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteComment()">🗑 Supprimer</button>
                    </div>
                </div>

                <div id="noComment" style="display:none">
                    <button class="btn btn-purple btn-sm btn-full" style="margin-top:8px" onclick="showCommentForm()">💬 Ajouter un commentaire</button>
                </div>

                <div id="commentForm" class="comment-form">
                    <textarea id="commentTextarea" placeholder="Votre commentaire…"></textarea>
                    <button class="btn btn-muted btn-sm btn-full" style="margin-bottom:6px" onclick="document.getElementById('commentImgInput').click()">📷 Choisir une image JPEG</button>
                    <input type="file" id="commentImgInput" accept=".jpg,.jpeg" onchange="previewCommentImg(this)">
                    <div id="commentImgPreview" style="display:none;margin-bottom:8px">
                        <img id="commentImgPreviewImg" style="max-width:100%;border-radius:8px">
                        <button class="btn btn-danger btn-sm" style="margin-top:4px" onclick="removeCommentImg()">✕ Retirer</button>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-success btn-sm" onclick="saveComment()">💾 Sauvegarder</button>
                        <button class="btn btn-muted btn-sm" onclick="cancelComment()">Annuler</button>
                    </div>
                </div>

                <button class="btn btn-success btn-full" id="btnExport" style="margin-top:10px" disabled onclick="exportCsv()">
                    💾 Sauvegarder le fichier CSV
                </button>
            </div>
        </div>

    </div><!-- /sidebarScroll -->
  </div><!-- /sidebar -->

  <!-- ── MAP AREA ─────────────────────────────────── -->
  <div id="mapArea">
    <div id="svgWrapper"></div>
    <div id="emptyHint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-1.447-.894L15 9m0 8V9m0 0L9 7"/>
        </svg>
        <p>Chargez une carte depuis le menu ☁️</p>
    </div>
  </div>

</div><!-- /appBody -->

<!-- ══ IMAGE MODAL ══════════════════════════════════ -->
<div id="imgModal">
    <button id="imgModalClose" onclick="closeImgModal()">✕</button>
    <img id="imgModalImg" src="" alt="">
</div>

<!-- ══ CONFIRM MODAL ════════════════════════════════ -->
<div class="modal" id="confirmModal">
    <div class="modal-box">
        <div class="modal-title">⚠️ Confirmation</div>
        <div class="modal-body" id="confirmMsg"></div>
        <div class="modal-btns">
            <button class="btn btn-success" onclick="confirmAction()">Confirmer</button>
            <button class="btn btn-muted" onclick="document.getElementById('confirmModal').classList.remove('open')">Annuler</button>
        </div>
    </div>
</div>

<!-- ══ TOAST ════════════════════════════════════════ -->
<div id="toast"></div>

<!-- ══════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════ -->
<script>
// ── STATE ──────────────────────────────────────────
let svgData = null, csvData = null, currentSvg = null, svgWrapper = null;
let originalCsvFileName = null;
let allSvgElements = [];
let commentsData = {};
let currentIdLot = null;
let hasUnsaved = false;

// transform state
let xform = { x: 0, y: 0, scale: 1 };

// touch state
let touches = {};
let lastDist = 0;
let lastCenter = null;
let isPinching = false;
let panStart = null;

// filter state
let sortMode = 'id'; // 'id' | 'count'
let activeFilterProprio = null;

// Google Drive state
let driveToken = null;
let driveFileIds = { svg: null, csv: null };
const DRIVE_CLIENT_ID = '270579218887-5jp1phjocqcik0pgbjtlit3n20on0de6.apps.googleusercontent.com'; // à remplir dans GitHub Pages
// drive.readonly = lire tous les fichiers (scope restreint, pas de vérification Google requise)
// drive.file     = créer/modifier les fichiers créés par cette appli
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/drive.file';
const DRIVE_FOLDER = 'Cartum';

// pending confirm callback
let _confirmCb = null;

// ── SIDEBAR RESIZE ──────────────────────────────────
(function() {
    const KEY = 'cartum_w';
    let resizing = false, startX = 0, startW = 0;
    const handle  = document.getElementById('sidebarResizeHandle');
    const sidebar = document.getElementById('sidebar');

    function applyWidth(w) {
        if (sidebar.classList.contains('collapsed')) return;
        w = Math.max(200, Math.min(Math.floor(window.innerWidth * 0.75), w));
        sidebar.style.width    = w + 'px';
        sidebar.style.minWidth = w + 'px';
        document.documentElement.style.setProperty('--menu-w', w + 'px');
        try { sessionStorage.setItem(KEY, w); } catch(e) {}
    }

    // Restore saved width
    try {
        const saved = sessionStorage.getItem(KEY);
        if (saved) applyWidth(parseInt(saved));
    } catch(e) {}

    function onStart(clientX) {
        if (sidebar.classList.contains('collapsed')) return;
        resizing = true; startX = clientX; startW = sidebar.offsetWidth;
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'ew-resize';
    }
    function onMove(clientX) { if (resizing) applyWidth(startW + (clientX - startX)); }
    function onEnd()  { resizing = false; document.body.style.userSelect = ''; document.body.style.cursor = ''; }

    handle.addEventListener('mousedown',  e => { e.preventDefault(); onStart(e.clientX); });
    document.addEventListener('mousemove', e => onMove(e.clientX));
    document.addEventListener('mouseup',   onEnd);
    handle.addEventListener('touchstart',  e => { e.stopPropagation(); onStart(e.touches[0].clientX); }, { passive: true });
    document.addEventListener('touchmove', e => { if (resizing) { e.preventDefault(); onMove(e.touches[0].clientX); } }, { passive: false });
    document.addEventListener('touchend',  onEnd);
})();

// ── TOUCH / PAN / ZOOM ─────────────────────────────
const mapArea = document.getElementById('mapArea');

mapArea.addEventListener('touchstart', onTouchStart, { passive: false });
mapArea.addEventListener('touchmove', onTouchMove, { passive: false });
mapArea.addEventListener('touchend', onTouchEnd, { passive: false });
mapArea.addEventListener('touchcancel', onTouchEnd, { passive: false });
// Mouse support
mapArea.addEventListener('mousedown', onMouseDown);
mapArea.addEventListener('mousemove', onMouseMove);
mapArea.addEventListener('mouseup', onMouseUp);
mapArea.addEventListener('wheel', onWheel, { passive: false });

function onTouchStart(e) {
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t => { touches[t.identifier] = { x: t.clientX, y: t.clientY }; });
    const ids = Object.keys(touches);
    if (ids.length === 2) {
        isPinching = true;
        const a = touches[ids[0]], b = touches[ids[1]];
        lastDist = Math.hypot(b.x - a.x, b.y - a.y);
        lastCenter = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    } else if (ids.length === 1) {
        isPinching = false;
        panStart = { px: touches[ids[0]].x, py: touches[ids[0]].y, tx: xform.x, ty: xform.y };
    }
}
function onTouchMove(e) {
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t => { touches[t.identifier] = { x: t.clientX, y: t.clientY }; });
    const ids = Object.keys(touches);
    if (ids.length >= 2 && isPinching) {
        const a = touches[ids[0]], b = touches[ids[1]];
        const dist = Math.hypot(b.x - a.x, b.y - a.y);
        const center = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
        const ratio = dist / lastDist;
        const rect = mapArea.getBoundingClientRect();
        zoom(center.x - rect.left, center.y - rect.top, ratio);
        lastDist = dist;
        lastCenter = center;
    } else if (ids.length === 1 && !isPinching && panStart) {
        const t = touches[ids[0]];
        xform.x = panStart.tx + (t.x - panStart.px);
        xform.y = panStart.ty + (t.y - panStart.py);
        applyXform();
    }
}
function onTouchEnd(e) {
    Array.from(e.changedTouches).forEach(t => { delete touches[t.identifier]; });
    const ids = Object.keys(touches);
    if (ids.length < 2) isPinching = false;
    if (ids.length === 0) panStart = null;
}

let isDragging = false, dragStart = null;
function onMouseDown(e) {
    isDragging = true;
    dragStart = { px: e.clientX, py: e.clientY, tx: xform.x, ty: xform.y };
}
function onMouseMove(e) {
    if (!isDragging || !dragStart) return;
    xform.x = dragStart.tx + (e.clientX - dragStart.px);
    xform.y = dragStart.ty + (e.clientY - dragStart.py);
    applyXform();
}
function onMouseUp(e) {
    if (Math.abs(e.clientX - (dragStart?.px||0)) < 4 && Math.abs(e.clientY - (dragStart?.py||0)) < 4) {
        // treat as tap/click for SVG elements
    }
    isDragging = false; dragStart = null;
}
function onWheel(e) {
    e.preventDefault();
    const rect = mapArea.getBoundingClientRect();
    zoom(e.clientX - rect.left, e.clientY - rect.top, e.deltaY > 0 ? 0.9 : 1.1);
}

function zoom(cx, cy, factor) {
    const newScale = Math.max(0.05, Math.min(20, xform.scale * factor));
    const ratio = newScale / xform.scale;
    xform.x = cx - (cx - xform.x) * ratio;
    xform.y = cy - (cy - xform.y) * ratio;
    xform.scale = newScale;
    applyXform();
}
function applyXform() {
    if (svgWrapper) {
        svgWrapper.style.transform = `translate(${xform.x}px,${xform.y}px) scale(${xform.scale})`;
    }
}

// ── ELEMENT MAPPING ─────────────────────────────────
function mapElements() {
    if (!currentSvg || !csvData) return;
    allSvgElements = [];
    currentSvg.querySelectorAll('*[inkscape\\:label]').forEach(el => {
        const label = el.getAttribute('inkscape:label');
        if (!label) return;
        let row = csvData.find(r => String(r.IdLot) === label);
        if (!row) { const m = label.match(/^(\d+)/); if (m) row = csvData.find(r => String(r.IdLot) === m[1]); }
        if (!row) row = csvData.find(r => r.IdLot && label.startsWith(r.IdLot));
        if (!row) row = csvData.find(r => r.IdLot && label.includes(r.IdLot));
        if (row) {
            el._csvData = row;
            allSvgElements.push(el);
            el.addEventListener('click', handleLotClick);
        }
    });
}

// ── LOT CLICK ───────────────────────────────────────
function handleLotClick(e) {
    e.stopPropagation();
    const el = e.target.closest('*[inkscape\\:label]');
    if (!el || !el._csvData) return;
    selectLot(el._csvData.IdLot, el);
}

function selectLot(idLot, clickedEl) {
    clearAllHighlights();
    currentIdLot = idLot;

    // highlight clicked element
    if (clickedEl) clickedEl.classList.add('hl-selected');

    // highlight same-owner elements
    const data = csvData.find(r => String(r.IdLot) === String(idLot));
    if (data && data.IdProprio) {
        allSvgElements.forEach(el => {
            if (el._csvData && el._csvData.IdProprio === data.IdProprio && el !== clickedEl) {
                el.classList.add('hl-same');
            }
        });
    }

    showLotInfo(idLot);
    updateHeader(idLot);
    openInfoSection();
    // Rafraîchir la liste du proprio si un filtre est actif ou si ce lot a un proprio
    const _d = csvData ? csvData.find(r => String(r.IdLot) === String(idLot)) : null;
    if (_d && _d.IdProprio) {
        if (activeFilterProprio === _d.IdProprio) {
            renderProprioLots(_d.IdProprio);
        } else if (activeFilterProprio) {
            renderProprioLots(activeFilterProprio);
        }
    }
}

// ── CSV EXPORT ──────────────────────────────────────
// ── CONSTRUCTION DU CONTENU CSV (partagée) ──────────
function buildCsvContent() {
    const headers = ['IdLot', 'IdProprio', 'Image', 'Famille', 'Lieu-dit', 'Cadrage', 'Texte', 'Picture'];
    const rows = csvData.map(r => {
        const nr = {};
        headers.forEach(h => { nr[h] = (h === 'Texte' || h === 'Picture') ? '' : (r[h] || ''); });
        if (commentsData[r.IdLot]) {
            if (commentsData[r.IdLot].text)
                nr.Texte = commentsData[r.IdLot].text.replace(/"/g, '""').replace(/[\r\n]+/g, ' ');
            if (commentsData[r.IdLot].picture) nr.Picture = commentsData[r.IdLot].picture;
        }
        return nr;
    });
    let csv = '\uFEFF' + headers.join(',') + '\n';
    rows.forEach(r => {
        csv += headers.map(h => {
            let v = r[h] || '';
            if (v.includes(',') || v.includes('"') || v.includes('\n')) v = '"' + v + '"';
            return v;
        }).join(',') + '\n';
    });
    return csv;
}

// ── EXPORT CSV : local + Drive si connecté ───────────
async function exportCsv() {
    if (!csvData) return;
    const csv      = buildCsvContent();
    const fileName = originalCsvFileName || 'legende.csv';

    // Téléchargement local (toujours)
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = fileName;
    a.click();
    hasUnsaved = false;
    updateExportBtn();
    toast('Fichier CSV téléchargé ✓');

    // Sauvegarde sur Drive en plus, si connecté
    if (driveToken) {
        try {
            const folderId = await getOrCreateFolder(DRIVE_FOLDER);
            if (driveFileIds.csv) {
                await updateDriveFile(driveFileIds.csv, csv, 'text/csv');
            } else {
                driveFileIds.csv = await createDriveFile(folderId, fileName, csv, 'text/csv');
            }
            toast(`CSV aussi sauvegardé sur Drive ✓ (${DRIVE_FOLDER}/${fileName})`);
            setDriveStatus(`✓ CSV mis à jour dans "${DRIVE_FOLDER}"`, 'connected');
        } catch(e) {
            toast('Drive (non bloquant) : ' + e.message);
        }
    }
}

// ── FILTER & SEARCH ─────────────────────────────────
function setSortMode(m) {
    sortMode = m;
    document.getElementById('sortById').classList.toggle('active', m === 'id');
    document.getElementById('sortByCount').classList.toggle('active', m === 'count');
    populateProprioFilter();
}

function populateProprioFilter() {
    const sel = document.getElementById('idProprioFilter');
    sel.innerHTML = '<option value="">— Tous les propriétaires —</option>';
    if (!csvData) return;
    const stats = {};
    (allSvgElements.length > 0 ? allSvgElements : []).forEach(el => {
        const r = el._csvData;
        if (r && r.IdProprio) {
            if (!stats[r.IdProprio]) stats[r.IdProprio] = { count: 0, famille: r.Famille || '' };
            stats[r.IdProprio].count++;
        }
    });
    if (Object.keys(stats).length === 0) {
        csvData.forEach(r => {
            if (r.IdProprio) {
                if (!stats[r.IdProprio]) stats[r.IdProprio] = { count: 0, famille: r.Famille || '' };
                stats[r.IdProprio].count++;
            }
        });
    }
    let arr = Object.entries(stats).map(([id, v]) => ({ id, ...v }));
    if (sortMode === 'count') arr.sort((a, b) => b.count - a.count);
    else arr.sort((a, b) => (parseInt(a.id) || 0) - (parseInt(b.id) || 0));
    arr.forEach(p => {
        const o = document.createElement('option');
        o.value = p.id;
        o.textContent = `${p.id}${p.famille ? ' ' + p.famille : ''} — ${p.count} lot${p.count > 1 ? 's' : ''}`;
        sel.appendChild(o);
    });
}

function applyProprioFilter() {
    const id = document.getElementById('idProprioFilter').value;
    activeFilterProprio = id || null;
    clearAllHighlights();

    // Hide lot list if no owner selected
    if (!id) {
        allSvgElements.forEach(el => el.style.opacity = '');
        renderProprioLots(null);
        return;
    }

    // Highlight owner's lots on map
    allSvgElements.forEach(el => {
        const r = el._csvData;
        if (r && r.IdProprio === id) {
            el.classList.add('hl-filter');
            el.style.opacity = '';
        } else {
            el.style.opacity = '0.15';
        }
    });

    // Build and show lot list below select
    renderProprioLots(id);
    expandSec('sec-filter');
}

function renderProprioLots(idProprio) {
    const container = document.getElementById('proprioLots');
    if (!idProprio || !csvData) {
        container.innerHTML = '';
        container.classList.remove('visible');
        return;
    }
    const lots = csvData.filter(r => r.IdProprio === idProprio);
    if (!lots.length) { container.classList.remove('visible'); return; }

    // Un lot est-il actif parmi ceux de ce proprio ?
    const hasActiveLot = currentIdLot && lots.some(r => String(r.IdLot) === String(currentIdLot));

    // Header : si un lot est sélectionné, rappel discret du proprio
    let header;
    if (hasActiveLot) {
        header = `<div style="font-size:0.72rem;color:var(--text-muted);padding:2px 2px 4px;font-weight:600;opacity:0.6">
            Propriétaire ${idProprio} — ${lots.length} lot${lots.length>1?'s':''} (cliquer pour changer)
        </div>`;
    } else {
        header = `<div style="font-size:0.75rem;color:var(--text-muted);padding:4px 2px 4px;font-weight:600">
            ${lots.length} lot${lots.length>1?'s':''} — cliquer pour sélectionner
        </div>`;
    }

    let html = header;
    lots.forEach(r => {
        const isSelected = String(r.IdLot) === String(currentIdLot);
        // Atténuer si un autre lot est actif
        const isDimmed   = hasActiveLot && !isSelected;
        const hasText    = r.Texte && r.Texte.trim() && r.Texte.trim() !== 'undefined';
        const hasCmt     = !!commentsData[r.IdLot];
        const lieuCadrage = [r['Lieu-dit'], r.Cadrage].filter(Boolean).join(' · ');

        let cls = 'pl-item';
        if (isSelected) cls += ' selected';
        if (isDimmed)   cls += ' dimmed';

        html += `<div class="${cls}" onclick="selectLotFromList('${r.IdLot}')">
            <div class="pl-item-top">
                <span class="pl-id">Lot ${r.IdLot}</span>
                ${hasText || hasCmt ? '<span class="pl-badge">💬</span>' : ''}
            </div>`;
        if (!isDimmed && lieuCadrage) html += `<div class="pl-sub">${escHtml(lieuCadrage)}</div>`;
        if (!isDimmed && hasText)     html += `<div class="pl-text">${escHtml(r.Texte.substring(0,90))}${r.Texte.length>90?'…':''}</div>`;
        html += `</div>`;
    });

    container.innerHTML = html;
    container.classList.add('visible');
}

function resetFilter() {
    clearAllHighlights();
    allSvgElements.forEach(el => el.style.opacity = '');
    document.getElementById('idProprioFilter').value = '';
    activeFilterProprio = null;
    renderProprioLots(null);
    document.getElementById('lotSearch').value = '';
    document.getElementById('searchStatus').textContent = '';
    document.getElementById('lotInfoBody').innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem">Appuyez sur un lot pour voir ses détails.</p>';
    currentIdLot = null;
    updateHeader('');
    updateCommentDisplay();
}

function searchLot() {
    const val = document.getElementById('lotSearch').value.trim();
    const st = document.getElementById('searchStatus');
    if (!val) { st.textContent = 'Saisir un numéro de lot'; st.className = 'status-msg err'; return; }
    if (!csvData) { st.textContent = 'Aucune légende chargée'; st.className = 'status-msg err'; return; }
    const data = csvData.find(r => String(r.IdLot) === val);
    if (!data) { st.textContent = `Lot ${val} introuvable`; st.className = 'status-msg err'; return; }
    const el = allSvgElements.find(e => e._csvData && String(e._csvData.IdLot) === val);
    clearAllHighlights();
    if (el) {
        el.classList.add('hl-search');
        // center on element
        centerOnElement(el);
    }
    selectLot(val, el || null);
    st.textContent = `Lot ${val} trouvé`; st.className = 'status-msg ok';
}

function clearSearch() {
    document.getElementById('lotSearch').value = '';
    document.getElementById('searchStatus').textContent = '';
    clearAllHighlights();
}

function centerOnElement(el) {
    try {
        const bbox = el.getBBox();
        const rect = mapArea.getBoundingClientRect();
        const svgEl = currentSvg;
        const vb = svgEl.viewBox.baseVal;
        const svgW = vb.width || svgEl.clientWidth;
        const svgH = vb.height || svgEl.clientHeight;
        // target scale to fill ~40% of screen
        const newScale = Math.min(rect.width / (bbox.width * 4), rect.height / (bbox.height * 4), 10);
        const cx = bbox.x + bbox.width / 2;
        const cy = bbox.y + bbox.height / 2;
        xform.scale = Math.max(0.1, newScale);
        xform.x = rect.width / 2 - cx * (rect.width / svgW) * xform.scale;
        xform.y = rect.height / 2 - cy * (rect.height / svgH) * xform.scale;
        applyXform();
    } catch(e) {}
}

// ── GOOGLE DRIVE ────────────────────────────────────
function driveConnect() {
    if (!DRIVE_CLIENT_ID) {
        toast('Client ID Google non configuré.');
        setDriveStatus('⚠️ DRIVE_CLIENT_ID vide – modifiez le fichier HTML', 'error');
        return;
    }
    const redirectUri = location.origin + location.pathname;
    // Afficher l'URI exact 2 secondes avant la redirection pour diagnostic
    setDriveStatus(`redirect_uri : ${redirectUri}`, '');
    const params = new URLSearchParams({
        client_id: DRIVE_CLIENT_ID,
        redirect_uri: redirectUri,
        response_type: 'token',
        scope: DRIVE_SCOPE,
        include_granted_scopes: 'true',
        state: 'drive_auth'
    });
    setTimeout(() => {
        window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
    }, 1500);
}

function checkDriveCallback() {
    // Case 1 – returning from Google OAuth (URL contains #access_token=...)
    const hash = window.location.hash;
    if (hash.includes('access_token')) {
        const p = new URLSearchParams(hash.slice(1));
        const token   = p.get('access_token');
        const expires = Date.now() + (parseInt(p.get('expires_in') || '3600') - 60) * 1000;
        driveToken = token;
        try {
            sessionStorage.setItem('cartum_tok', token);
            sessionStorage.setItem('cartum_exp', expires);
        } catch(e) {}
        // Clean URL without triggering a reload
        history.replaceState(null, '', location.pathname + location.search);
        _driveConnected();
        // Re-expand Drive section after OAuth redirect
        setTimeout(() => { expandSec('sec-drive'); }, 300);
        return;
    }
    // Case 2 – page reload or navigation: restore token from sessionStorage
    try {
        const tok = sessionStorage.getItem('cartum_tok');
        const exp = parseInt(sessionStorage.getItem('cartum_exp') || '0');
        if (tok && Date.now() < exp) {
            driveToken = tok;
            _driveConnected();
        }
    } catch(e) {}
}

function _driveConnected() {
    setDriveStatus('Connecté à Google Drive ✓', 'connected');
    document.getElementById('btnDriveLoad').disabled = false;
    document.getElementById('btnDriveSave').disabled = false;
    toast('Google Drive connecté ✓');
}

function setDriveStatus(msg, cls) {
    const el = document.getElementById('driveStatus');
    el.textContent = msg;
    el.className = 'status-msg ' + (cls || '');
}

async function driveLoad() {
    if (!driveToken) { toast('Non connecté'); return; }
    setDriveStatus('Recherche du dossier Cartum…');
    try {
        // 1. Trouver (ou créer) le dossier Cartum
        const folderId = await getOrCreateFolder(DRIVE_FOLDER);
        setDriveStatus(`Dossier Cartum trouvé, lecture des fichiers…`);

        // 2. Lister les fichiers dans ce dossier uniquement
        const files = await listDriveFiles(folderId);
        const svgFile = files.find(f => f.name.toLowerCase().endsWith('.svg')) || null;
        const csvFile = files.find(f => f.name.toLowerCase().endsWith('.csv')) || null;

        const foundMsg = `Cartum : SVG ${svgFile ? '✓' : '✗'}  CSV ${csvFile ? '✓' : '✗'}`;
        setDriveStatus(foundMsg);

        if (svgFile) {
            const text = await downloadDriveFile(svgFile.id);
            svgData = text; driveFileIds.svg = svgFile.id;
            renderSvg();
            toast(`SVG chargé : ${svgFile.name}`);
        }
        if (csvFile) {
            const text = await downloadDriveFile(csvFile.id);
            originalCsvFileName = csvFile.name; driveFileIds.csv = csvFile.id;
            parseCsv(text);
            toast(`CSV chargé : ${csvFile.name}`);
        }
        if (!svgFile && !csvFile) {
            setDriveStatus(`Aucun .svg/.csv dans le dossier "${DRIVE_FOLDER}"`, 'error');
            toast(`Aucun fichier dans "${DRIVE_FOLDER}"`);
        } else {
            setDriveStatus(`✓ ${svgFile ? svgFile.name : '—'} / ${csvFile ? csvFile.name : '—'}`, 'connected');
        }
    } catch(e) {
        console.error('driveLoad error', e);
        setDriveStatus('Erreur : ' + e.message, 'error');
        toast('Erreur Drive : ' + e.message);
    }
}

async function driveSave() {
    if (!driveToken) { toast('Non connecté'); return; }
    if (!csvData)    { toast('Aucune légende à sauvegarder'); return; }
    setDriveStatus(`Sauvegarde dans "${DRIVE_FOLDER}"…`);
    try {
        const csv      = buildCsvContent();
        const fileName = originalCsvFileName || 'legende.csv';
        const folderId = await getOrCreateFolder(DRIVE_FOLDER);
        if (driveFileIds.csv) {
            await updateDriveFile(driveFileIds.csv, csv, 'text/csv');
        } else {
            driveFileIds.csv = await createDriveFile(folderId, fileName, csv, 'text/csv');
        }
        hasUnsaved = false; updateExportBtn();
        setDriveStatus(`✓ "${DRIVE_FOLDER}/${fileName}" sauvegardé`, 'connected');
        toast('CSV sauvegardé sur Drive ✓');
    } catch(e) {
        setDriveStatus('Erreur : ' + e.message, 'error');
        toast('Erreur sauvegarde : ' + e.message);
    }
}

async function driveTest() {
    if (!driveToken) { toast('Non connecté à Drive'); return; }
    try {
        const r = await fetch('https://www.googleapis.com/drive/v3/about?fields=user', {
            headers: { Authorization: 'Bearer ' + driveToken }
        });
        const d = await r.json();
        toast(`Drive OK – ${d.user?.displayName || 'connecté'}`);
        setDriveStatus(`Connecté : ${d.user?.emailAddress || 'OK'}`, 'connected');
    } catch(e) {
        toast('Erreur TEST : ' + e.message);
        setDriveStatus('Erreur TEST Drive', 'error');
    }
}

// Drive helpers
async function searchDriveByType(ext) {
    // Drive API v3: q parameter must NOT be double-encoded.
    // Use URLSearchParams to encode only the value, not the whole URL.
    // "name contains 'svg'" works; the dot must be excluded from the contains clause.
    const extNoDot = ext.replace('.', '');  // 'svg' or 'csv'
    const params = new URLSearchParams({
        q: `name contains '${extNoDot}' and trashed = false`,
        fields: 'files(id,name,mimeType,parents)',
        orderBy: 'modifiedTime desc',
        pageSize: '20'
    });
    const r = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`, {
        headers: { Authorization: 'Bearer ' + driveToken }
    });
    if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error(`Drive API ${r.status}: ${err?.error?.message || r.statusText}`);
    }
    const d = await r.json();
    // Filter strictly: file must end with .svg or .csv (not just contain 'svg')
    return (d.files || []).filter(f => f.name.toLowerCase().endsWith(ext));
}

async function getOrCreateFolder(name) {
    const params = new URLSearchParams({
        q: `name = '${name}' and mimeType = 'application/vnd.google-apps.folder' and trashed = false`,
        fields: 'files(id,name)'
    });
    const r = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`, {
        headers: { Authorization: 'Bearer ' + driveToken }
    });
    const d = await r.json();
    if (d.files && d.files.length > 0) return d.files[0].id;
    // create
    const cr = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + driveToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder' })
    });
    const cd = await cr.json();
    return cd.id;
}

async function listDriveFiles(folderId) {
    const params = new URLSearchParams({
        q: `'${folderId}' in parents and trashed = false`,
        fields: 'files(id,name,mimeType)'
    });
    const r = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`, {
        headers: { Authorization: 'Bearer ' + driveToken }
    });
    const d = await r.json();
    return d.files || [];
}

async function downloadDriveFile(fileId) {
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: { Authorization: 'Bearer ' + driveToken }
    });
    return r.text();
}

async function createDriveFile(folderId, name, content, mime) {
    const meta = JSON.stringify({ name, parents: [folderId] });
    const form = new FormData();
    form.append('metadata', new Blob([meta], { type: 'application/json' }));
    form.append('file', new Blob([content], { type: mime }));
    const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + driveToken },
        body: form
    });
    const d = await r.json();
    return d.id;
}

async function updateDriveFile(fileId, content, mime) {
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + driveToken, 'Content-Type': mime },
        body: content
    });
}

let toastTimer;
function toast(msg, dur = 2800) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), dur);
}
